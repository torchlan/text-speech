<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech - Voice Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .powered-by {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .voice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .voice-btn {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #555;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .voice-btn:hover {
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .voice-btn.active {
            border-color: #764ba2;
            background: #f3e8ff;
            color: #764ba2;
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.2);
        }

        .voice-icon {
            font-size: 1.4rem;
        }

        .voice-details {
            display: flex;
            flex-direction: column;
        }

        .voice-name {
            font-weight: 600;
        }

        .voice-lang {
            font-size: 0.8rem;
            color: #888;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            color: #888;
            font-size: 0.85rem;
            margin-top: 6px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .audio-container {
            margin-top: 24px;
            display: none;
        }

        .audio-container.show {
            display: block;
        }

        audio {
            width: 100%;
            border-radius: 12px;
        }

        .recording-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #f44336;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .speed-control {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }

        .speed-control label {
            color: #555;
            font-weight: 500;
        }

        .speed-control input[type="range"] {
            width: 150px;
            accent-color: #667eea;
        }

        .speed-value {
            color: #667eea;
            font-weight: 600;
            min-width: 40px;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 24px 0;
        }

        .developed-by {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        .warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #e65100;
            display: none;
        }

        .warning.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .voice-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="powered-by">Powered by: The Real Estate Network</div>
        
        <h1>🎙️ Text to Speech</h1>
        <p class="subtitle">Select a voice and type your text</p>

        <div class="warning" id="warningBox">
            ⚠️ Please open this file in Chrome browser for best voice support. Your current browser has limited TTS voices.
        </div>

        <div class="voice-grid" id="voiceGrid">
            <button class="voice-btn active" data-voice="David" onclick="setVoice('David')">
                <span class="voice-icon">👨</span>
                <div class="voice-details">
                    <span class="voice-name">David</span>
                    <span class="voice-lang">English (US) - Male</span>
                </div>
            </button>
            <button class="voice-btn" data-voice="Kylie" onclick="setVoice('Kylie')">
                <span class="voice-icon">👩</span>
                <div class="voice-details">
                    <span class="voice-name">Kylie</span>
                    <span class="voice-lang">English (US) - Female</span>
                </div>
            </button>
            <button class="voice-btn" data-voice="Mario" onclick="setVoice('Mario')">
                <span class="voice-icon">👨</span>
                <div class="voice-details">
                    <span class="voice-name">Mario</span>
                    <span class="voice-lang">English (UK) - Male for Tagalog</span>
                </div>
            </button>
            <button class="voice-btn" data-voice="Petra" onclick="setVoice('Petra')">
                <span class="voice-icon">👩</span>
                <div class="voice-details">
                    <span class="voice-name">Petra</span>
                    <span class="voice-lang">Filipino - Female</span>
                </div>
            </button>
        </div>

        <div class="speed-control">
            <label>Speed:</label>
            <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="1" oninput="updateSpeed(this.value)">
            <span class="speed-value" id="speedValue">1.0x</span>
        </div>

        <textarea id="textInput" placeholder="Enter your text here..."></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>

        <div class="controls">
            <button class="btn btn-primary" id="speakBtn" onclick="speak()">
                <span>▶️</span> Speak
            </button>
            <button class="btn btn-secondary" id="recordBtn" onclick="toggleRecord()" disabled>
                <span id="recordIcon">⏺️</span> <span id="recordText">Record & Download</span>
            </button>
            <button class="btn btn-secondary" onclick="clearText()">
                <span>🗑️</span> Clear
            </button>
        </div>

        <div class="status" id="status"></div>

        <div class="audio-container" id="audioContainer">
            <div class="divider"></div>
            <audio id="audioPlayer" controls></audio>
        </div>

        <div class="developed-by">Developed by: Torch Castro</div>
    </div>

    <script>
        let currentVoiceName = 'David';
        let speechSpeed = 1;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioBlob = null;
        let allVoices = [];
        let isNativeTTS = false;

        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const status = document.getElementById('status');
        const recordBtn = document.getElementById('recordBtn');
        const warningBox = document.getElementById('warningBox');

        // Voice configuration - maps display names to actual browser voice search terms
        const voiceConfig = {
            'David': { gender: 'male', lang: 'en', keywords: ['david', 'google us english', 'male'] },
            'Kylie': { gender: 'female', lang: 'en', keywords: ['zira', 'google us english', 'female', 'samantha'] },
            'Mario': { gender: 'male', lang: 'en', keywords: ['daniel', 'google uk english', 'male', 'british'] },
            'Petra': { gender: 'female', lang: 'fil', keywords: ['filipino', 'fil'] }
        };

        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        function setVoice(name) {
            currentVoiceName = name;
            document.querySelectorAll('.voice-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.voice === name);
            });
        }

        function updateSpeed(val) {
            speechSpeed = parseFloat(val);
            document.getElementById('speedValue').textContent = val + 'x';
        }

        function showStatus(msg, type = 'info') {
            status.textContent = msg;
            status.className = 'status show ' + type;
            setTimeout(() => status.classList.remove('show'), 5000);
        }

        function loadVoices() {
            return new Promise(resolve => {
                let voices = speechSynthesis.getVoices();
                if (voices.length > 0) {
                    allVoices = voices;
                    resolve(voices);
                } else {
                    speechSynthesis.onvoiceschanged = () => {
                        allVoices = speechSynthesis.getVoices();
                        resolve(allVoices);
                    };
                }
            });
        }

        function findBestVoice(config) {
            // First try: exact language match + gender hint in name
            let candidates = allVoices.filter(v => {
                const name = v.name.toLowerCase();
                const lang = v.lang.toLowerCase();
                
                // Check if language matches
                const langMatch = config.lang === 'fil' 
                    ? (lang.startsWith('fil') || lang.startsWith('tl'))
                    : lang.startsWith(config.lang);
                
                if (!langMatch) return false;
                
                // Check gender hints
                const hasGenderHint = config.keywords.some(k => name.includes(k.toLowerCase()));
                return hasGenderHint;
            });

            if (candidates.length > 0) return candidates[0];

            // Second try: language match only
            candidates = allVoices.filter(v => {
                const lang = v.lang.toLowerCase();
                return config.lang === 'fil' 
                    ? (lang.startsWith('fil') || lang.startsWith('tl'))
                    : lang.startsWith(config.lang);
            });

            if (candidates.length > 0) {
                // For Petra, prefer female-sounding names if no exact match
                if (config.gender === 'female') {
                    const femaleFirst = candidates.find(v => 
                        /female|woman|girl|zira/i.test(v.name)
                    );
                    if (femaleFirst) return femaleFirst;
                }
                return candidates[0];
            }

            // Last resort: any voice
            return allVoices[0];
        }

        async function init() {
            await loadVoices();
            
            if (allVoices.length === 0) {
                warningBox.classList.add('show');
                showStatus('No TTS voices found. Please use Chrome browser.', 'error');
                return;
            }

            isNativeTTS = true;
            recordBtn.disabled = false;
            
            // Log available voices for debugging
            console.log('Available voices:', allVoices.map(v => `${v.name} (${v.lang})`));
        }

        function speak() {
            const text = textInput.value.trim();
            if (!text) {
                showStatus('Please enter some text first!', 'error');
                return;
            }

            if (!window.speechSynthesis) {
                showStatus('Speech synthesis not supported in this browser.', 'error');
                warningBox.classList.add('show');
                return;
            }

            if (allVoices.length === 0) {
                showStatus('Voices not loaded yet. Please wait.', 'error');
                return;
            }

            speechSynthesis.cancel();

            const config = voiceConfig[currentVoiceName];
            const voice = findBestVoice(config);

            if (!voice) {
                showStatus('No suitable voice found for ' + currentVoiceName, 'error');
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voice;
            utterance.lang = voice.lang;
            utterance.rate = speechSpeed;
            utterance.pitch = 1;

            utterance.onstart = () => {
                showStatus(`Speaking with ${currentVoiceName} (${voice.name})...`, 'info');
                recordBtn.disabled = false;
            };

            utterance.onend = () => {
                showStatus('Finished speaking!', 'success');
            };

            utterance.onerror = (e) => {
                showStatus('Error: ' + e.error, 'error');
            };

            speechSynthesis.speak(utterance);
        }

        async function toggleRecord() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                const mimeTypes = [
                    'audio/webm;codecs=opus',
                    'audio/webm',
                    'audio/mp4',
                    'audio/ogg'
                ];
                
                let selectedMime = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || '';

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: selectedMime,
                    audioBitsPerSecond: 128000
                });

                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: selectedMime || 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = audioUrl;
                    
                    document.getElementById('audioContainer').classList.add('show');
                    showStatus('Recording complete! You can now download the audio.', 'success');
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start(100);
                isRecording = true;
                
                document.getElementById('recordIcon').textContent = '⏹️';
                document.getElementById('recordText').innerHTML = '<span class="recording-indicator"><span class="pulse"></span> Recording...</span>';
                recordBtn.classList.add('btn-primary');
                recordBtn.classList.remove('btn-secondary');
                
                showStatus('Recording started! Speak now...', 'info');

                setTimeout(() => {
                    const text = textInput.value.trim();
                    if (text && isNativeTTS) {
                        const config = voiceConfig[currentVoiceName];
                        const voice = findBestVoice(config);
                        
                        const utterance = new SpeechSynthesisUtterance(text);
                        if (voice) {
                            utterance.voice = voice;
                            utterance.lang = voice.lang;
                        }
                        utterance.rate = speechSpeed;
                        utterance.pitch = 1;
                        
                        utterance.onend = () => {
                            setTimeout(() => stopRecording(), 500);
                        };
                        
                        speechSynthesis.speak(utterance);
                    }
                }, 300);

            } catch (err) {
                showStatus('Microphone access denied or not available: ' + err.message, 'error');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            
            document.getElementById('recordIcon').textContent = '⏺️';
            document.getElementById('recordText').textContent = 'Record & Download';
            recordBtn.classList.remove('btn-primary');
            recordBtn.classList.add('btn-secondary');
        }

        function downloadAudio() {
            if (!audioBlob) {
                showStatus('No audio recorded yet!', 'error');
                return;
            }

            const text = textInput.value.trim().substring(0, 30).replace(/[^a-z0-9]/gi, '_') || 'speech';
            const voiceLabel = currentVoiceName;
            
            const extension = audioBlob.type.includes('mp4') ? 'm4a' : 'webm';
            const filename = `${text}_${voiceLabel}.${extension}`;
            
            const url = URL.createObjectURL(audioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus(`Downloaded as ${extension.toUpperCase()}`, 'success');
        }

        function clearText() {
            textInput.value = '';
            charCount.textContent = '0';
            document.getElementById('audioContainer').classList.remove('show');
            speechSynthesis.cancel();
            if (isRecording) stopRecording();
            audioBlob = null;
        }

        window.addEventListener('load', () => {
            init();
        });
    </script>
</body>
</html>
